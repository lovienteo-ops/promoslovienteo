[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── lovienteopromos.com — landings de producto ──
[[redirects]]
  from = "/aspiradora-voltra-3en1/*"
  to = "/aspiradora-voltra-3en1/:splat"
  status = 200
  conditions = {Host = ["lovienteopromos.com", "www.lovienteopromos.com"]}

