  from = "/*"
  to = "/lovienteopromos/index.html"
  status = 200
  conditions = {Host = ["lovienteopromos.com", "www.lovienteopromos.com"]}

# ── Dominio principal de Bolt — admin panel ──
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin.html"
  status = 200

# ── Dominio principal de Bolt — SPA catch-all ──
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
